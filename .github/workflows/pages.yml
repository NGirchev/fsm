name: GitHub Pages

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - "fsm-visual-editor/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: fsm-visual-editor/package-lock.json

    - name: Configure GitHub Pages
      uses: actions/configure-pages@v5

    - name: Install dependencies
      working-directory: fsm-visual-editor
      run: npm ci

    - name: Run tests
      working-directory: fsm-visual-editor
      run: npm test

    - name: Build site
      working-directory: fsm-visual-editor
      env:
        VITE_BASE_PATH: /${{ github.event.repository.name }}/
      run: npm run build

    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: fsm-visual-editor/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
